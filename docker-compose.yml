services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: loomis
      POSTGRES_PASSWORD: loomis
      POSTGRES_DB: loomis

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loomis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: